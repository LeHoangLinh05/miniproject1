# Mypy configuration file
# Ref: https://mypy.readthedocs.io/en/stable/config_file.html

[mypy]
# Specify the target Python version
python_version = 3.10

# Show error codes in output
show_error_codes = True

# Use visually nicer output
pretty = True

# Strict mode configuration (highly recommended for FastAPI projects)
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_equality = True

# Disable strict checking for imports missing type stubs, but handle it gracefully
ignore_missing_imports = True

# Pydantic plugin configuration (since FastAPI uses Pydantic)
plugins = pydantic.mypy

[pydantic-mypy]
init_forbid_extra = True
init_typed = True
warn_required_dynamic_aliases = True

# Exclude environment folder
exclude = (?x)(
    ^\.venv/
    | ^venv/
  )
