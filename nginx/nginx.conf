user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # 1. Định nghĩa Upstream
    # Upstream định nghĩa một nhóm các server có thể nhận request từ Nginx.
    # Ở đây chúng ta dùng tên service của Docker Compose làm domain.
    upstream backend_servers {
        server backend:8000;
    }

    upstream frontend_servers {
        server frontend:3000;
    }

    # 2. Cấu hình Server HTTP (Port 80) - Tự động chuyển hướng (Redirect) sang HTTPS
    server {
        listen 80;
        server_name localhost 15.135.194.148;

        # Chuyển hướng mọi request HTTP sang HTTPS (301 Moved Permanently)
        return 301 https://$host$request_uri;
    }

    # 3. Cấu hình Server HTTPS (Port 443)
    server {
        listen 443 ssl;
        server_name localhost 15.135.194.148;

        # Đường dẫn tới SSL Certificates (được tự động sinh bởi entrypoint.sh)
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Route /api/ -> backend (FastAPI routes dùng prefix /api)
        location /api/ {
            proxy_pass http://backend_servers;
            
            # Thiết lập các header cần thiết để backend biết IP thực của client
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Hỗ trợ WebSockets (nếu backend có sử dụng real-time)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Route / -> frontend
        location / {
            # proxy_pass gửi toàn bộ request còn lại tới frontend
            proxy_pass http://frontend_servers;
            
            # Header
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Hỗ trợ WebSockets (Rất cần thiết cho cơ chế Hot Reload của Next.js/Vite ở local)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
